
name: Metrics
on:
  # Schedule otomatis berjalan setiap jam 12 malam
  schedule: [{cron: "0 0 * * *"}]
  # Jalankan otomatis setiap kali kamu push ke repo ini
  push: {branches: ["master", "main"]}
  # Mengizinkan kamu menjalankan manual via tombol di tab Actions
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Cyber Dark Metrics
        uses: lowlighter/metrics@latest
        with:
          # Gunakan token yang sudah kita simpan di secrets tadi
          token: ${{ secrets.METRICS_TOKEN }}

          # Konfigurasi Dasar
          user: YOUR_GITHUB_USERNAME # Ganti dengan username GitHub kamu
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Jakarta
          
          # Desain & Tema (Sangat cocok untuk dark/cyber theme)
          theme: terminal # Pilihan tema keren lainnya: dark, twilight, ryu
          palette: prussian # Menggunakan aksen warna biru-cyan yang bersih

          # Plugin Tambahan (Opsional, hapus jika tidak ingin dipakai)
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
