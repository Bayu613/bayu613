name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  push: {branches: ["master", "main"]}
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Ini memaksa action agar punya akses write
    steps:
      - name: Generate Cyber Dark Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Bayu613
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Jakarta
          theme: terminal
          palette: prussian
          
          # Tambahkan 2 baris ini di paling bawah untuk memaksa output masuk ke branch utama kamu
          filename: github-metrics.svg
          committer_branch: main # Sesuai dengan branch di screenshot kamu (main)

          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
